name: CLI Release

on:
  push:
    branches:
      - qa
      - main
    paths:
      - "crates/cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/cli-release.yml"
      - "scripts/install-bella-cli.sh"
      - "apps/docs/cli-beta.md"
  workflow_dispatch:

concurrency:
  group: cli-release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: bella-cli-linux-x86_64
          - os: macos-13
            artifact: bella-cli-macos-x86_64
          - os: macos-14
            artifact: bella-cli-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache Cargo
        uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330

      - name: Install audit tooling
        run: |
          cargo install cargo-auditable --locked
          cargo install cargo-audit --locked

      - name: Test
        run: cargo test -p bella-cli

      - name: Build
        run: cargo auditable build --release -p bella-cli

      - name: Audit binary
        run: cargo audit bin target/release/bella

      - name: Package
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/release/bella dist/${{ matrix.artifact }}/bella
          cp README.md dist/${{ matrix.artifact }}/README.md
          tar -C dist -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          (cd dist && shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256)

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Publish ${{ github.ref_name }} channel release
    if: github.ref_name == 'qa' || github.ref_name == 'main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true

      - name: Resolve channel
        id: channel
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=bella-cli-prod" >> "$GITHUB_OUTPUT"
            echo "title=Bella CLI prod beta" >> "$GITHUB_OUTPUT"
            echo "channel=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tag=bella-cli-qa" >> "$GITHUB_OUTPUT"
            echo "title=Bella CLI QA beta" >> "$GITHUB_OUTPUT"
            echo "channel=qa" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish channel release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.channel.outputs.tag }}
          TITLE: ${{ steps.channel.outputs.title }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          gh release delete "$TAG" --cleanup-tag --yes || true
          gh release create "$TAG" dist/*.tar.gz dist/*.tar.gz.sha256 \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --prerelease \
            --notes "Automated Bella CLI beta build for the $CHANNEL channel from $GITHUB_SHA."
