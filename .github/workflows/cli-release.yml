name: CLI Release

on:
  push:
    tags:
      - "bella-cli-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: bella-cli-linux-x86_64
          - os: macos-13
            artifact: bella-cli-macos-x86_64
          - os: macos-14
            artifact: bella-cli-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache Cargo
        uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330

      - name: Install audit tooling
        run: |
          cargo install cargo-auditable --locked
          cargo install cargo-audit --locked

      - name: Test
        run: cargo test -p bella-cli

      - name: Build
        run: cargo auditable build --release -p bella-cli

      - name: Audit binary
        run: cargo audit bin target/release/bella

      - name: Package
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/release/bella dist/${{ matrix.artifact }}/bella
          cp README.md dist/${{ matrix.artifact }}/README.md
          tar -C dist -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          shasum -a 256 dist/${{ matrix.artifact }}.tar.gz > dist/${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          prerelease: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
