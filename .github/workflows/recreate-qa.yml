name: Recreate QA from main

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: recreate-qa-from-main
  cancel-in-progress: false

jobs:
  recreate-qa:
    name: Recreate qa branch
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reset qa to main
        run: |
          main_sha="$(git rev-parse HEAD)"
          git push --force origin HEAD:refs/heads/qa
          {
            echo "## QA recreated"
            echo
            echo "\`qa\` now points at \`main\` commit \`$main_sha\`."
          } >> "$GITHUB_STEP_SUMMARY"
