name: bella

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      bella-api:
        condition: service_healthy
      bella-web:
        condition: service_started
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      BELLA_DOMAIN: ${BELLA_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - bella

  bella-web:
    build:
      context: ../..
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      BELLA_INTERNAL_API_URL: http://bella-api:3000
      NEXT_PUBLIC_BELLA_API_BASE_URL: /api
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "5173"
      HOSTNAME: 0.0.0.0
    expose:
      - "5173"
    networks:
      - bella

  bella-api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BELLA_PUBLIC_API_URL: ${BELLA_PUBLIC_API_URL}
      BELLA_WEB_URL: ${BELLA_WEB_URL}
      BELLA_SECURE_COOKIES: ${BELLA_SECURE_COOKIES}
      BELLA_CREDENTIAL_ENCRYPTION_KEY: ${BELLA_CREDENTIAL_ENCRYPTION_KEY}
      BELLA_API_BIND_ADDR: ${BELLA_API_BIND_ADDR}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - bella

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - bella

networks:
  bella:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
